<div class="category-header">
  <button 
    type="button" 
    class="expand-button" 
    [class.expanded]="isExpanded"
    (click)="toggleExpand()"
    [disabled]="isLoading"
    [attr.aria-expanded]="isExpanded"
  >
    <svg class="chevron-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M7 8L10 11L13 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="category-info">
    <h3 class="category-name">{{ category.name }}</h3>
    @if (category.description) {
      <p class="category-description">{{ category.description }}</p>
    }
  </div>

  @if (isLoading) {
    <span class="loading-spinner" aria-label="Loading documents"></span>
  }
</div>
