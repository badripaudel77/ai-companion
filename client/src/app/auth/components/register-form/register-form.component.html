<form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
  @if (error) {
      <div class="form-alert" role="alert">{{ error }}</div>
  }

  <label class="field-group">
    <span>Full name</span>
    <input
        type="text" formControlName="fullname"
        autocomplete="name" placeholder="Your full name"
    />
    @if (form.controls.fullname.touched && form.controls.fullname.hasError('required')) {
          <small class="field-error">Full name is required.</small>
    }
    @if (form.controls.fullname.touched && form.controls.fullname.hasError('minlength')) {
          <small class="field-error">Full name must be at least 2 characters.</small>
    }
  </label>

  <label class="field-group">
    <span>Email</span>
    <input
        type="email" formControlName="email"
        autocomplete="email" placeholder="name@company.com"
    />
    @if (form.controls.email.touched && form.controls.email.hasError('required')) {
          <small class="field-error">Email is required.</small>
    }
    @if (form.controls.email.touched && form.controls.email.hasError('email')) {
          <small class="field-error">Enter a valid email address.</small>
    }
  </label>

  <label class="field-group">
    <span>Password</span>
    <input
        type="password"formControlName="password"
        autocomplete="new-password" placeholder="Create a strong password"
    />
    @if (form.controls.password.touched && form.controls.password.hasError('required')) {
          <small class="field-error">Password is required.</small>
    }
    @if (form.controls.password.touched && form.controls.password.hasError('minlength')) {
          <small class="field-error">Password must be at least 8 characters.</small>
    }
  </label>

  <button class="submit-button" type="submit" [disabled]="loading">
    @if (loading) {
        Creating account...
    } 
    @else {
        Create account
    }
  </button>
</form>
