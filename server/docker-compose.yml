version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mycompanion-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: my_doc_companion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_doc_companion"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: