spring:
  application:
    name: server

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:PASS_KEY_AS_ENV_VARIABLE}
        chat:
          options:
            model: gemini-2.5-flash-lite
            max-tokens: 5000
            max-output-tokens: 10000
        embedding:
          text:
            options:
              model: models/gemini-embedding-001
              dimensions: 3072
          project-id: gen-lang-client-0596568832
          location: us-central1
    vectorstore:
      pgvector:
        dimensions: 3072 # Set the dimensions for the vector embeddings (must match the dimensions of the embeddings generated by the model)
        index-type: none
        distance-type: cosine_distance
        initialize-schema: true # Automatically create the pgvector extension and the necessary tables (vector_store) if they don't exist

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/my_doc_companion}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:

  mvc:
    apiversion:
      use:
        path-segment: 1

mycompanion:
  JWT_SECRET: ${MYCOMPANION_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  REFRESH_TOKEN_SECRET: ${MYCOMPANION_REFRESH_TOKEN_SECRET:6B5970404E635266556A586E3272357538782F413F4428472B4B625064536756}
  ACCESS_TOKEN_VALIDITY: 3600000

logging:
  level:
    org.hibernate.SQL: debug
    root: info